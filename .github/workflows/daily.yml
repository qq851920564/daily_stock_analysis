name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'  # 北京时间 18:00 运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行分析脚本
        run: python main.py
